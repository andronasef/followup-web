# Local dev only. Full stack run command (documented per 01-01-PLAN.md
# Task 3, exercised once during setup):
#
#   docker compose up -d db
#   npm install
#   npm run migrate
#   npm run dev
#   curl localhost:3000/api/health
#
# Coolify supplies its own managed Postgres in production — this file is not
# deployed there, it exists only so a fresh clone can reach a real database
# without any manual Postgres install.
#
# The `app` service (below) is optional and exists so
# `docker compose up --build app` exercises the exact same Dockerfile image
# that ships to Coolify, against this same local Postgres — a local
# end-to-end check of Plan 01-13's build/migrate/start path without needing
# a Coolify instance.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      # Parameterized (not hardcoded) so a real password can be supplied in
      # production via Dokploy's Compose environment-variable editor -- the
      # local-dev defaults below are intentionally weak/well-known, never
      # meant to survive past a laptop.
      POSTGRES_DB: ${POSTGRES_DB:-onechat}
      POSTGRES_USER: ${POSTGRES_USER:-onechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onechat}
    # OPS-09: never let pastoral/faith message text reach container logs.
    # log_statement=none disables all statement-text logging outright.
    # log_min_duration_statement=-1 (disabled, the Postgres default) is set
    # explicitly rather than left implicit -- that setting also logs full
    # statement text for slow queries independent of log_statement, so it
    # must stay off too, or a slow query would leak message content into
    # the Postgres log the same way log_statement would. This is the exact
    # equivalent Coolify-side config: its managed Postgres resource accepts
    # the same `-c` flags via its "Custom Postgres Configuration" field.
    command: ["postgres", "-c", "log_statement=none", "-c", "log_min_duration_statement=-1"]
    # No `ports:` mapping here on purpose -- publishing 5432 to the host
    # would expose Postgres directly on the server's public IP in a real
    # deployment (Dokploy/production). `app` reaches it over the compose
    # network by service name (db:5432) below; local dev that needs a host
    # port for e.g. a GUI client can add one back temporarily.
    volumes:
      # Named volume — OPS-06 verifies data survives a deliberate restart.
      - onechat_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onechat} -d ${POSTGRES_DB:-onechat}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: builds and runs the same production Dockerfile locally,
  # against the `db` service above. Not started by a bare `docker compose up`
  # (no `depends_on` reference elsewhere) — run explicitly via
  # `docker compose up --build app`. Coolify does not use this compose file;
  # it builds the same Dockerfile directly against its own managed Postgres.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Service-name DNS inside the compose network, not localhost:5433.
      # Must be built from the same POSTGRES_USER/PASSWORD/DB vars as the
      # `db` service above -- if you override those in Dokploy, override
      # this to match (Dokploy's ${VAR} interpolation doesn't compose these
      # sub-values automatically).
      DATABASE_URL: ${DATABASE_URL:-postgres://onechat:onechat@db:5432/onechat}
      SESSION_SECRET: ${SESSION_SECRET:-local-dev-session-secret-not-for-prod}
      SETUP_TOKEN: ${SETUP_TOKEN:-local-dev-setup-token}
      IP_HASH_SECRET: ${IP_HASH_SECRET:-local-dev-ip-hash-secret}
      OVH_API_KEY: ${OVH_API_KEY:-}
      OVH_BASE_URL: ${OVH_BASE_URL:-https://oai.endpoints.kepler.ai.cloud.ovh.net/v1}
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-nvidia}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_MODEL_ID: ${NVIDIA_MODEL_ID:-qwen/qwen3.5-397b-a17b}
    # No `ports:` publish on purpose -- Dokploy/Traefik reaches this
    # container over the internal compose network once a Domain is assigned
    # to the `app` service (container port 3000), and a host-port publish
    # here is exactly what collided with another already-running deployment
    # on the same server (see 01-13-SUMMARY.md's Dokploy deploy notes). For
    # local dev curl-testing, add a temporary `ports: ["3000:3000"]` back or
    # run `docker compose exec app wget -qO- localhost:3000/api/health`.

volumes:
  onechat_db_data:
